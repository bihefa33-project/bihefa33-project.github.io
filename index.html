<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Otomatis</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { color: #333; }
        
        /* Galeri Grid - Mengatur tata letak kartu secara proporsional */
        .galeri { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: flex-start; /* Kartu tidak dipaksa sama tinggi */
            gap: 20px; 
            margin-top: 20px; 
        }
        
        .card { 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column;
            align-items: center;
            width: 280px; /* Batas lebar kartu */
            padding-bottom: 10px;
        }
        
        /* Gambar mengikuti rasio asli foto */
        .card img { 
            width: 100%; 
            height: auto; /* Otomatis mengikuti proporsi asli foto (landscape/portrait/persegi) */
            object-fit: contain; 
            cursor: pointer; 
            transition: transform 0.2s ease;
            display: block;
        }
        .card img:hover { transform: scale(1.02); }

        .btn-download {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-download:hover { background-color: #0056b3; }

        /* Modal Lightbox (Tampilan Zoom) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        /* Zoom foto menggunakan ukuran asli maksimal */
        .modal-content {
            max-width: 90%;
            max-height: 80vh;
            width: auto;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .modal-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover { color: #ccc; }
    </style>
</head>
<body>

    <h1>Galeri Foto Pribadi</h1>
    <p>Klik foto untuk memperbesar atau gunakan tombol download untuk menyimpan.</p>

    <div class="galeri" id="galeri-foto">Memuat foto...</div>

    <!-- Modal Lightbox -->
    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgFull">
        <div class="modal-actions">
            <a id="downloadModalLink" href="#" download class="btn-download" target="_blank">Download Foto Original</a>
        </div>
    </div>

    <script>
        const username = 'bihefa33-project';
        const repo = 'bihefa33-project.github.io';
        const folder = 'images';

        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const galeriDiv = document.getElementById('galeri-foto');
                galeriDiv.innerHTML = '';

                data.forEach(file => {
                    if(file.type === 'file' && /\.(jpg|jpeg|png|webp)$/i.test(file.name)) {
                        // Membuat elemen pembungkus (Card)
                        const card = document.createElement('div');
                        card.className = 'card';

                        // Elemen Gambar
                        const img = document.createElement('img');
                        img.src = file.download_url;
                        img.alt = file.name;
                        
                        // Fitur Klik untuk Zoom
                        img.onclick = () => openModal(file.download_url, file.name);

                        // Tombol Download Kartu
                        const downloadBtn = document.createElement('a');
                        downloadBtn.href = file.download_url;
                        downloadBtn.download = file.name;
                        downloadBtn.className = 'btn-download';
                        downloadBtn.innerText = 'Download';
                        downloadBtn.target = '_blank';

                        card.appendChild(img);
                        card.appendChild(downloadBtn);
                        galeriDiv.appendChild(card);
                    }
                });
            })
            .catch(error => {
                console.error('Gagal memuat foto:', error);
                document.getElementById('galeri-foto').innerText = 'Gagal memuat foto.';
            });

        // Fungsi Buka Modal Zoom
        function openModal(src, filename) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('imgFull');
            const downloadLink = document.getElementById('downloadModalLink');

            modal.style.display = 'flex';
            modalImg.src = src;
            downloadLink.href = src;
            downloadLink.download = filename;
        }

        // Fungsi Tutup Modal
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Tutup modal jika area luar gambar diklik
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
